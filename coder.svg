<svg width="340" height="380" viewBox="0 0 340 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .float-group {
        animation: float 3.8s ease-in-out infinite;
        transform-origin: 170px 200px;
      }
      @keyframes float {
        0%,100% { transform: translateY(0px); }
        50%      { transform: translateY(-14px); }
      }
      .shadow-el {
        animation: shadow 3.8s ease-in-out infinite;
        transform-origin: 170px 340px;
      }
      @keyframes shadow {
        0%,100% { transform: scaleX(1); opacity: 0.5; }
        50%      { transform: scaleX(0.65); opacity: 0.2; }
      }
      .cur { animation: blink 1s step-end infinite; }
      @keyframes blink {
        0%,100% { opacity:1; } 50% { opacity:0; }
      }
      .code-l1 { animation: codeA 2.2s 0.0s ease-in-out infinite; }
      .code-l2 { animation: codeA 2.5s 0.3s ease-in-out infinite; }
      .code-l3 { animation: codeA 2.0s 0.6s ease-in-out infinite; }
      .code-l4 { animation: codeA 2.7s 0.2s ease-in-out infinite; }
      .code-l5 { animation: codeA 2.3s 0.5s ease-in-out infinite; }
      .code-l6 { animation: codeA 2.6s 0.8s ease-in-out infinite; }
      @keyframes codeA {
        0%,55%,100% { opacity:1; } 75% { opacity:0.1; }
      }
      .bit1 { animation: fallbit 2.8s 0.0s ease-out infinite; }
      .bit2 { animation: fallbit 2.8s 0.7s ease-out infinite; }
      .bit3 { animation: fallbit 2.8s 1.4s ease-out infinite; }
      @keyframes fallbit {
        0%   { opacity:0; transform: translateY(-16px); }
        20%  { opacity:1; }
        80%  { opacity:1; }
        100% { opacity:0; transform: translateY(10px); }
      }
      .label-py  { animation: lf1 3.2s 0.0s ease-in-out infinite; }
      .label-eda { animation: lf1 3.6s 0.4s ease-in-out infinite; }
      .label-ai  { animation: lf1 3.0s 0.8s ease-in-out infinite; }
      .label-dat { animation: lf1 3.4s 0.2s ease-in-out infinite; }
      @keyframes lf1 {
        0%,100% { transform: translateY(0); }
        50%     { transform: translateY(-6px); }
      }
      .glow-pulse { animation: gp 3.8s ease-in-out infinite; }
      @keyframes gp {
        0%,100% { opacity:0.3; } 50% { opacity:0.7; }
      }
      .eye-glow { animation: eg 2s ease-in-out infinite; }
      @keyframes eg {
        0%,100% { opacity:0.9; } 50% { opacity:0.5; }
      }
    </style>

    <radialGradient id="glow_scr" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="body_grad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#162840"/>
      <stop offset="100%" stop-color="#0a1822"/>
    </radialGradient>
    <radialGradient id="head_grad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a3350"/>
      <stop offset="100%" stop-color="#0d1f32"/>
    </radialGradient>
    <filter id="softblur">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="glow_f">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="340" height="380" fill="#050a10"/>

  <!-- Grid lines -->
  <g opacity="0.06" stroke="#00e5ff" stroke-width="0.5">
    <line x1="0" y1="60"  x2="340" y2="60"/>
    <line x1="0" y1="120" x2="340" y2="120"/>
    <line x1="0" y1="180" x2="340" y2="180"/>
    <line x1="0" y1="240" x2="340" y2="240"/>
    <line x1="0" y1="300" x2="340" y2="300"/>
    <line x1="60"  y1="0" x2="60"  y2="380"/>
    <line x1="120" y1="0" x2="120" y2="380"/>
    <line x1="180" y1="0" x2="180" y2="380"/>
    <line x1="240" y1="0" x2="240" y2="380"/>
    <line x1="300" y1="0" x2="300" y2="380"/>
  </g>

  <!-- Shadow on ground -->
  <ellipse class="shadow-el" cx="170" cy="340" rx="90" ry="12" fill="#00e5ff" filter="url(#softblur)" opacity="0.4"/>

  <!-- ===== FLOATING GROUP ===== -->
  <g class="float-group">

    <!-- Ambient glow behind character -->
    <ellipse class="glow_pulse" cx="170" cy="195" rx="90" ry="80" fill="url(#glow_scr)" filter="url(#softblur)" opacity="0.4"/>

    <!-- DESK -->
    <rect x="52"  y="278" width="236" height="14" rx="7"  fill="#0c1c2e"/>
    <rect x="62"  y="292" width="216" height="48" rx="5"  fill="#070d18"/>
    <rect x="62"  y="292" width="216" height="48" rx="5"  fill="none" stroke="#0f2236" stroke-width="1"/>

    <!-- LAPTOP BASE -->
    <rect x="74"  y="190" width="192" height="92"  rx="10" fill="#0b1c2e"/>
    <rect x="74"  y="190" width="192" height="92"  rx="10" fill="none" stroke="#173655" stroke-width="1.5"/>

    <!-- SCREEN -->
    <rect x="86"  y="200" width="168" height="72"  rx="6"  fill="#040c18"/>
    <rect x="86"  y="200" width="168" height="72"  rx="6"  fill="#001830" fill-opacity="0.6"/>

    <!-- Screen glow overlay -->
    <rect x="86"  y="200" width="168" height="72"  rx="6"  fill="url(#glow_scr)" opacity="0.4"/>

    <!-- Code lines on screen -->
    <rect class="code-l1" x="94" y="210" width="80" height="4" rx="2" fill="#00e5ff" opacity="0.85"/>
    <rect class="code-l2" x="94" y="220" width="50" height="3" rx="1.5" fill="#b06efb" opacity="0.7"/>
    <rect class="code-l3" x="102" y="229" width="90" height="3" rx="1.5" fill="#00ffa3" opacity="0.75"/>
    <rect class="code-l4" x="102" y="238" width="60" height="3" rx="1.5" fill="#b06efb" opacity="0.6"/>
    <rect class="code-l5" x="94" y="247" width="100" height="3" rx="1.5" fill="#00e5ff" opacity="0.65"/>
    <rect class="code-l6" x="94" y="256" width="40" height="3" rx="1.5" fill="#ffd166" opacity="0.6"/>
    <!-- Cursor -->
    <rect class="cur" x="135" y="254" width="6" height="9" rx="1" fill="#00e5ff"/>

    <!-- Binary bits floating off screen -->
    <text class="bit1" x="226" y="212" font-size="9" fill="#00e5ff" font-family="monospace" text-anchor="middle">01</text>
    <text class="bit2" x="232" y="232" font-size="9" fill="#00ffa3" font-family="monospace" text-anchor="middle">11</text>
    <text class="bit3" x="222" y="252" font-size="9" fill="#b06efb" font-family="monospace" text-anchor="middle">10</text>

    <!-- BODY / HOODIE -->
    <rect x="112" y="130" width="96" height="64" rx="18" fill="url(#body_grad)"/>
    <rect x="112" y="130" width="96" height="64" rx="18" fill="none" stroke="#1e3f60" stroke-width="1"/>
    <!-- hoodie zipper -->
    <line x1="160" y1="134" x2="160" y2="194" stroke="#0f2840" stroke-width="2"/>
    <!-- hoodie pocket accent -->
    <rect x="144" y="160" width="32" height="22" rx="5" fill="#001830" fill-opacity="0.5"/>
    <rect x="144" y="160" width="32" height="22" rx="5" fill="none" stroke="#1e3f60" stroke-width="0.8"/>
    <!-- chest glow text "DS" -->
    <text x="160" y="176" text-anchor="middle" font-size="8" fill="#00e5ff" font-family="monospace" opacity="0.5" font-weight="bold">DS</text>

    <!-- LEFT ARM -->
    <rect x="74" y="138" width="44" height="16" rx="8" fill="url(#body_grad)" stroke="#1e3f60" stroke-width="1" transform="rotate(30 96 146)"/>
    <!-- RIGHT ARM -->
    <rect x="200" y="138" width="44" height="16" rx="8" fill="url(#body_grad)" stroke="#1e3f60" stroke-width="1" transform="rotate(-30 222 146)"/>

    <!-- HANDS on keyboard -->
    <ellipse cx="92"  cy="278" rx="14" ry="8" fill="#132233"/>
    <ellipse cx="248" cy="278" rx="14" ry="8" fill="#132233"/>

    <!-- HEAD -->
    <ellipse cx="160" cy="96" rx="42" ry="46" fill="url(#head_grad)"/>
    <ellipse cx="160" cy="96" rx="42" ry="46" fill="none" stroke="#1e3f60" stroke-width="1.2"/>

    <!-- Face glow -->
    <ellipse cx="160" cy="102" rx="26" ry="24" fill="#00e5ff" fill-opacity="0.03"/>

    <!-- HEADPHONES arc -->
    <path d="M120 86 Q120 50 160 50 Q200 50 200 86" fill="none" stroke="#0d2036" stroke-width="8" stroke-linecap="round"/>
    <!-- headphone cups -->
    <rect x="112" y="82" width="16" height="22" rx="6" fill="#0f2240"/>
    <rect x="192" y="82" width="16" height="22" rx="6" fill="#0f2240"/>
    <!-- cup glows -->
    <rect x="113" y="83" width="14" height="20" rx="5" fill="#00e5ff" fill-opacity="0.2"/>
    <rect x="193" y="83" width="14" height="20" rx="5" fill="#00e5ff" fill-opacity="0.2"/>
    <rect x="114" y="84" width="12" height="2"  rx="1" fill="#00e5ff" fill-opacity="0.6"/>
    <rect x="194" y="84" width="12" height="2"  rx="1" fill="#00e5ff" fill-opacity="0.6"/>

    <!-- EYES -->
    <ellipse cx="145" cy="96" rx="9" ry="10" fill="#040c18"/>
    <ellipse cx="175" cy="96" rx="9" ry="10" fill="#040c18"/>
    <ellipse cx="145" cy="96" rx="9" ry="10" fill="none" stroke="#1e3f60" stroke-width="0.8"/>
    <ellipse cx="175" cy="96" rx="9" ry="10" fill="none" stroke="#1e3f60" stroke-width="0.8"/>
    <!-- Pupils - glowing cyan -->
    <circle class="eye-glow" cx="145" cy="96" r="5" fill="#00e5ff" filter="url(#glow_f)"/>
    <circle class="eye-glow" cx="175" cy="96" r="5" fill="#00e5ff" filter="url(#glow_f)"/>
    <!-- Specular -->
    <circle cx="147" cy="93" r="2" fill="#ffffff" opacity="0.7"/>
    <circle cx="177" cy="93" r="2" fill="#ffffff" opacity="0.7"/>

    <!-- SMILE -->
    <path d="M151 108 Q160 115 169 108" fill="none" stroke="#1e4060" stroke-width="2" stroke-linecap="round"/>

    <!-- Hair tuft -->
    <ellipse cx="160" cy="52" rx="18" ry="10" fill="#0a1826"/>
    <ellipse cx="148" cy="50" rx="7"  rx2="9" ry="8" fill="#0c1f33" transform="rotate(-20 148 50)"/>
    <ellipse cx="172" cy="50" rx="7"  rx2="9" ry="8" fill="#0c1f33" transform="rotate(20 172 50)"/>

  </g>
  <!-- ===== END FLOATING GROUP ===== -->

  <!-- ===== FLOATING LABELS (outside float group so they have independent timing) ===== -->

  <!-- Python label - top right -->
  <g class="label-py" transform="translate(246, 58)">
    <rect width="66" height="22" rx="11" fill="#00e5ff" fill-opacity="0.10"/>
    <rect width="66" height="22" rx="11" fill="none" stroke="#00e5ff" stroke-opacity="0.35" stroke-width="1"/>
    <circle cx="13" cy="11" r="3.5" fill="#00e5ff" opacity="0.7"/>
    <text x="22" y="15" font-size="10" fill="#00e5ff" font-family="monospace" font-weight="500">Python</text>
  </g>

  <!-- EDA label - top left -->
  <g class="label-eda" transform="translate(22, 100)">
    <rect width="52" height="22" rx="11" fill="#00ffa3" fill-opacity="0.08"/>
    <rect width="52" height="22" rx="11" fill="none" stroke="#00ffa3" stroke-opacity="0.30" stroke-width="1"/>
    <circle cx="12" cy="11" r="3.5" fill="#00ffa3" opacity="0.7"/>
    <text x="21" y="15" font-size="10" fill="#00ffa3" font-family="monospace" font-weight="500">EDA</text>
  </g>

  <!-- AI/ML label - bottom right -->
  <g class="label-ai" transform="translate(248, 248)">
    <rect width="58" height="22" rx="11" fill="#b06efb" fill-opacity="0.10"/>
    <rect width="58" height="22" rx="11" fill="none" stroke="#b06efb" stroke-opacity="0.30" stroke-width="1"/>
    <circle cx="12" cy="11" r="3.5" fill="#b06efb" opacity="0.7"/>
    <text x="21" y="15" font-size="10" fill="#b06efb" font-family="monospace" font-weight="500">AI/ML</text>
  </g>

  <!-- Data label - bottom left -->
  <g class="label-dat" transform="translate(22, 248)">
    <rect width="52" height="22" rx="11" fill="#ffd166" fill-opacity="0.08"/>
    <rect width="52" height="22" rx="11" fill="none" stroke="#ffd166" stroke-opacity="0.28" stroke-width="1"/>
    <circle cx="12" cy="11" r="3.5" fill="#ffd166" opacity="0.7"/>
    <text x="21" y="15" font-size="10" fill="#ffd166" font-family="monospace" font-weight="500">Data</text>
  </g>

  <!-- Bottom label strip -->
  <rect x="0" y="356" width="340" height="24" fill="#050a10"/>
  <text x="170" y="371" text-anchor="middle" font-size="9" fill="#00e5ff" fill-opacity="0.45" font-family="monospace" letter-spacing="3">ANALYSING · PREDICTING · BUILDING</text>

</svg>
